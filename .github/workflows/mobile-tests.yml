name: Mobile Tests
on:  
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test-mobile:
    name: Lint, Tests and Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --runInBand --watchman=false

      - name: Run TypeScript check
        run: npx tsc --noEmit
